<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectraShop — Magazin Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo-wrap"><img src="logo.png" alt="ElectraShop"></div>
            <div class="brand-name">Electra<span>Shop</span></div>
            <div class="header-search">
                <input type="text" placeholder="Caută produse, mărci...">
                <button>:mag:</button>
            </div>
            <div class="header-actions">
                <button id="loginBtn" class="header-btn">:bust_in_silhouette: Login</button>
                <button id="logoutBtn" class="header-btn" style="display:none;">:door: Logout</button>
                <span id="userEmail" class="user-email" style="display:none;"></span>
                <button id="cartBtn" class="header-btn cart-btn">:shopping_cart: Coș (<span id="cartCount">0</span>)</button>
            </div>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="active">Acasă</a>
            <a href="laptopuri.html">Laptopuri</a>
            <a href="calculatoare.html">Calculatoare</a>
            <a href="apple.html">Apple</a>
            <a href="monitoare.html">Monitoare</a>
            <a href="componente-pc.html">Componente PC</a>
            <a href="gaming.html">Gaming</a>
            <a href="imprimante.html">Imprimante</a>
            <a href="oferte.html">Oferte</a>
        </nav>
    </header>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Autentificare</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="exemplu@gmail.com">
                </div>
                <div class="form-group">
                    <label>Parolă</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-submit">Autentificare</button>
            </form>
        </div>
    </div>

    <!-- Cart Modal (Coșul de cumpărături) -->
    <div id="cartModal" class="modal">
        <div class="modal-content cart-content">
            <span class="close-modal" id="closeCart">&times;</span>
            <h2>Coșul meu :shopping_cart:</h2>
            <div id="cartItems" class="cart-items">
                <p class="empty-cart-msg">Coșul este gol.</p>
            </div>
            <div class="cart-footer">
                <h3>Total: <span id="cartTotal">0 MDL</span></h3>
            </div>
        </div>
    </div>

    <main class="page">
        <div class="promo-banner">
            <div class="promo-text">
                <h2>Cele mai bune prețuri la tehnică!</h2>
                <p>Livrare rapidă în toată Moldova</p>
            </div>
            <div class="promo-badge">-30%</div>
        </div>

        <h2 class="section-title">Produse recomandate</h2>
        <div id="prodGrid" class="products-grid"></div>
    </main>

    <footer>
        <p>Electra Shop | © 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
