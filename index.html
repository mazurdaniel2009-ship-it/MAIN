<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectraShop - Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo_placeholder.png" alt="ElectraShop">
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Caută produse...">
                <button>🔍</button>
            </div>
            <nav>
                <button class="all-products-btn">Toate produsele</button>
            </nav>
        </div>
    </header>

    <section class="categories-grid">
        <div class="category-item">💻<span>Laptops</span></div>
        <div class="category-item">🖥️<span>Computers</span></div>
        <div class="category-item">🍎<span>Apple</span></div>
        <div class="category-item">📺<span>Monitors</span></div>
        <div class="category-item">⚙️<span>PC Components</span></div>
        <div class="category-item">💺<span>Gaming Chairs</span></div>
        <div class="category-item">🧹<span>Vacuum Cleaners</span></div>
        <div class="category-item">🖨️<span>Printers</span></div>
    </section>

    <main class="products-container">
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
        <div class="product-card"></div>
    </main>

    <div class="pagination">
        <button>&laquo;</button>
        <button class="active">1</button>
        <button>2</button>
        <button>3</button>
        <span>...</span>
        <button>5</button>
        <button>&raquo;</button>
    </div>

</body>
</html>
